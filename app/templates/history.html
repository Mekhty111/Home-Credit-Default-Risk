{% extends "base.html" %}
{% block title %}History{% endblock %}
{% block content %}

<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
  <div class="section-title" data-i18n="history_title"></div>
  <button onclick="clearHist()" style="font-family:inherit;font-size:11px;color:var(--error);background:none;border:1px solid var(--error);border-radius:4px;padding:4px 12px;cursor:pointer;opacity:.7" data-i18n="clear_all"></button>
</div>

<div class="card" style="padding:0;overflow:hidden">
  <div style="overflow-x:auto">
    <table class="hist-table">
      <thead>
        <tr>
          <th data-i18n="col_id"></th>
          <th data-i18n="col_timestamp"></th>
          <th data-i18n="col_score"></th>
          <th data-i18n="col_risk"></th>
          <th data-i18n="col_action"></th>
          <th data-i18n="col_lr"></th>
          <th data-i18n="col_lgbm"></th>
        </tr>
      </thead>
      <tbody id="hist-body"></tbody>
    </table>
  </div>
</div>

<script>
function renderHistory() {
  const h = Storage.getHistory();
  const tbody = document.getElementById('hist-body');
  if (!h.length) {
    tbody.innerHTML = `<tr><td colspan="7" style="color:var(--faint);padding:32px;text-align:center">
      <span data-i18n="no_history"></span>
      <a href="/ui/score" style="color:var(--primary)" data-i18n="run_first"></a>
    </td></tr>`;
    applyTranslations();
    return;
  }
  tbody.innerHTML = h.map((e, i) => {
    const ac = actionColor(e.action);
    const rc = riskColor(e.risk_band);
    return `<tr>
      <td style="color:var(--faint)">${String(i+1).padStart(4,'0')}</td>
      <td style="color:var(--muted)">${e.timestamp||'—'}</td>
      <td style="font-weight:700;color:${rc}">${e.score}</td>
      <td style="color:${rc}">${e.risk_band}</td>
      <td style="font-weight:600;color:${ac}">${e.action}</td>
      <td>${(e.lr_probability*100).toFixed(2)}%</td>
      <td>${(e.lgbm_probability*100).toFixed(2)}%</td>
    </tr>`;
  }).join('');
}

function clearHist() {
  if (!confirm('Clear all history?')) return;
  Storage.clearHistory();
  renderHistory();
}

document.addEventListener('DOMContentLoaded', renderHistory);
document.addEventListener('langchange', () => { applyTranslations(); renderHistory(); });
</script>
{% endblock %}
