{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}

<div class="section-title" data-i18n="system_dashboard"></div>

<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-label" data-i18n="total_scored"></div>
    <div class="stat-value c-primary" id="st-total">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label" data-i18n="approved"></div>
    <div class="stat-value c-primary" id="st-approved">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label" data-i18n="rejected"></div>
    <div class="stat-value c-error" id="st-rejected">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label" data-i18n="avg_score"></div>
    <div class="stat-value c-text" id="st-avg">—</div>
  </div>
</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
  <div class="card">
    <div class="section-title" data-i18n="quick_actions"></div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:8px">
      <a href="/ui/score" class="btn-secondary" data-i18n="btn_run"></a>
      <a href="/ui/history" class="btn-secondary" data-i18n="btn_history"></a>
    </div>
  </div>
  <div class="card">
    <div class="section-title" data-i18n="system_status"></div>
    <div style="font-size:12px;line-height:2" id="status-block">
      <div>  api_url  = <span style="color:var(--primary)">http://localhost:8000</span></div>
      <div>  model_lr  = <span id="feat-status" style="color:var(--muted)">loading...</span></div>
      <div>  cors     = <span style="color:var(--primary)">enabled</span></div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  const h = Storage.getHistory();
  document.getElementById('st-total').textContent    = h.length;
  const approved = h.filter(e => e.action && e.action.startsWith('APPROVE'));
  const rejected = h.filter(e => e.action && e.action === 'REJECT');
  document.getElementById('st-approved').textContent = approved.length;
  document.getElementById('st-rejected').textContent = rejected.length;
  if (h.length) {
    const avg = Math.round(h.reduce((s,e)=>s+e.score,0)/h.length);
    document.getElementById('st-avg').textContent = avg;
  }
  try {
    const r = await fetch('/features');
    const d = await r.json();
    document.getElementById('feat-status').textContent = `${d.count} features loaded`;
    document.getElementById('feat-status').style.color = 'var(--primary)';
  } catch {
    document.getElementById('feat-status').textContent = 'offline';
    document.getElementById('feat-status').style.color = 'var(--error)';
  }
});
</script>
{% endblock %}
